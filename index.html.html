<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vira Bismillah</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#fff7ed,#ffedd5,#ffe4e6);
      padding:25px;
      color:#292524;
    }

    .container{
      max-width:1100px;
      margin:auto;
    }

    .hero{
      background:white;
      border-radius:30px;
      padding:35px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      margin-bottom:25px;
    }

    .tag{
      background:#ffedd5;
      color:#c2410c;
      display:inline-block;
      padding:8px 15px;
      border-radius:999px;
      font-size:14px;
      font-weight:bold;
      margin-bottom:15px;
    }

    h1{
      font-size:48px;
      margin-bottom:10px;
    }

    .hero p{
      color:#57534e;
      font-size:18px;
      line-height:1.5;
      max-width:600px;
    }

    .member-box{
      background:#1c1917;
      color:white;
      padding:25px;
      border-radius:24px;
      min-width:150px;
      text-align:center;
    }

    .member-box span{
      color:#fdba74;
      font-size:14px;
    }

    .member-box h2{
      font-size:42px;
      margin-top:8px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 2fr;
      gap:25px;
    }

    .card{
      background:white;
      border-radius:28px;
      padding:25px;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
    }

    .card h2{
      margin-bottom:18px;
      font-size:26px;
    }

    input{
      width:100%;
      padding:14px;
      border-radius:16px;
      border:1px solid #d6d3d1;
      font-size:16px;
      outline:none;
    }

    input:focus{
      border-color:#f97316;
    }

    button{
      border:none;
      border-radius:14px;
      cursor:pointer;
      font-weight:bold;
      transition:0.2s;
    }

    button:disabled{
      opacity:0.5;
      cursor:not-allowed;
    }

    .add-btn{
      width:100%;
      margin-top:12px;
      padding:14px;
      background:#f97316;
      color:white;
      font-size:15px;
    }

    .add-btn:hover{
      background:#ea580c;
    }

    .goal{
      margin-top:25px;
      background:#fff7ed;
      padding:18px;
      border-radius:18px;
      line-height:1.6;
      color:#57534e;
    }

    .goal strong{
      color:#292524;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
      gap:15px;
    }

    .top-buttons{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .status{
      background:#dcfce7;
      color:#15803d;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:bold;
    }

    .sync-status{
      background:#e0f2fe;
      color:#0369a1;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:bold;
    }

    .member-row{
      background:#fafaf9;
      border:1px solid #f5f5f4;
      border-radius:20px;
      padding:18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:15px;
      margin-bottom:14px;
    }

    .member-name{
      font-size:20px;
      font-weight:bold;
      margin-bottom:6px;
    }

    .stats{
      color:#57534e;
      font-size:14px;
      line-height:1.7;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .done-btn{
      background:#22c55e;
      color:white;
      padding:10px 15px;
    }

    .not-btn{
      background:white;
      color:#dc2626;
      border:1px solid #fecaca;
      padding:10px 15px;
    }

    .remove-btn{
      background:#ef4444;
      color:white;
      padding:10px 15px;
    }

    .leaderboard{
      margin-top:25px;
    }

    .leader-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
    }

    .leader-card{
      background:linear-gradient(135deg,#fafaf9,#fff7ed);
      padding:20px;
      border-radius:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }

    .rank{
      color:#ea580c;
      font-size:14px;
      font-weight:bold;
    }

    .leader-card h3{
      margin:8px 0;
      font-size:22px;
    }

    .active{
      color:#16a34a;
      font-weight:bold;
    }

    .inactive{
      color:#dc2626;
      font-weight:bold;
    }

    @media(max-width:800px){
      .hero,
      .member-row,
      .header{
        flex-direction:column;
        align-items:flex-start;
      }

      .grid,
      .leader-grid{
        grid-template-columns:1fr;
      }

      h1{
        font-size:36px;
      }

      .actions{
        width:100%;
      }

      .actions button{
        flex:1;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="hero">
    <div>
      <div class="tag">📖 Vira Bismillah</div>
      <h1>Vira Bismillah</h1>
      <p>
        We will be reading 3 pages of Risale every day.
        Keep your streak alive and motivate each other.
      </p>
    </div>

    <div class="member-box">
      <span>Members</span>
      <h2 id="memberCount">0</h2>
    </div>
  </div>

  <div class="grid">

    <div class="card">
      <h2>Join Challenge</h2>

      <input
        type="text"
        id="nameInput"
        placeholder="Enter your name"
      />

      <button class="add-btn" id="addBtn">
        Add Member
      </button>

      <div class="goal">
        <strong>Daily Goal</strong><br>
        Read 3 pages of Risale every day and mark yourself as done.
      </div>
    </div>

    <div class="card">
      <div class="header">
        <h2>Today's Check-In</h2>

        <div class="top-buttons">
          <span class="status">Done / Not Done</span>
          <span class="sync-status" id="syncStatus">Connecting...</span>
        </div>
      </div>

      <div id="memberList"></div>
    </div>

  </div>

  <div class="card leaderboard">
    <h2>🏆 Leaderboard</h2>
    <div class="leader-grid" id="leaderboard"></div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    doc,
    updateDoc,
    deleteDoc,
    onSnapshot,
    query,
    getDocs,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  // STEP 1: Replace this with your Firebase config.
  // Firebase Console > Project settings > Your apps > Web app config
  const firebaseConfig = {
    apiKey: "PASTE_YOUR_API_KEY_HERE",
    authDomain: "PASTE_YOUR_PROJECT.firebaseapp.com",
    projectId: "PASTE_YOUR_PROJECT_ID_HERE",
    storageBucket: "PASTE_YOUR_PROJECT.appspot.com",
    messagingSenderId: "PASTE_YOUR_SENDER_ID_HERE",
    appId: "PASTE_YOUR_APP_ID_HERE"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const membersRef = collection(db, "viraMembers");

  const today = new Date().toDateString();
  let members = [];

  const nameInput = document.getElementById("nameInput");
  const addBtn = document.getElementById("addBtn");
  const syncStatus = document.getElementById("syncStatus");

  addBtn.addEventListener("click", addMember);

  nameInput.addEventListener("keydown", function(event){
    if(event.key === "Enter"){
      addMember();
    }
  });

  onSnapshot(query(membersRef), snapshot => {
    members = snapshot.docs.map(item => ({
      id: item.id,
      ...item.data()
    }));

    syncStatus.textContent = "Live sync on";
    displayMembers();
  }, error => {
    console.error(error);
    syncStatus.textContent = "Sync error";
    alert("Firebase is not connected yet. Please check your Firebase config and Firestore rules.");
  });

  async function addMember(){
    const name = nameInput.value.trim();

    if(name === ""){
      alert("Please enter a name.");
      return;
    }

    const existingSnapshot = await getDocs(membersRef);
    const exists = existingSnapshot.docs.some(item => {
      const member = item.data();
      return member.name.toLowerCase() === name.toLowerCase();
    });

    if(exists){
      alert("This name already exists.");
      return;
    }

    await addDoc(membersRef, {
      name: name,
      streak: 0,
      total: 0,
      checkedToday: false,
      lastCheckDate: "",
      createdAt: serverTimestamp()
    });

    nameInput.value = "";
  }

  async function removeMember(id, name){
    const confirmRemove = confirm("Remove " + name + " from the challenge?");

    if(!confirmRemove){
      return;
    }

    await deleteDoc(doc(db, "viraMembers", id));
  }

  async function checkIn(id, done){
    const member = members.find(item => item.id === id);

    if(!member){
      return;
    }

    if(member.lastCheckDate === today){
      alert("Already checked in today.");
      return;
    }

    if(done){
      await updateDoc(doc(db, "viraMembers", id), {
        checkedToday: true,
        lastCheckDate: today,
        streak: Number(member.streak || 0) + 1,
        total: Number(member.total || 0) + 3
      });
    }else{
      await updateDoc(doc(db, "viraMembers", id), {
        checkedToday: false,
        lastCheckDate: today,
        streak: 0
      });
    }
  }

  function displayMembers(){
    const memberList = document.getElementById("memberList");
    const leaderboard = document.getElementById("leaderboard");
    const memberCount = document.getElementById("memberCount");

    memberCount.textContent = members.length;
    memberList.innerHTML = "";
    leaderboard.innerHTML = "";

    members.forEach(member => {
      const alreadyChecked = member.lastCheckDate === today;

      const row = document.createElement("div");
      row.className = "member-row";

      row.innerHTML = `
        <div>
          <div class="member-name">${escapeHTML(member.name)}</div>
          <div class="stats">
            🔥 ${Number(member.streak || 0)} day streak <br>
            📖 ${Number(member.total || 0)} pages total <br>
            <span class="${member.checkedToday ? "active" : "inactive"}">
              ${member.checkedToday ? "Continuing streak" : "Not done today"}
            </span>
          </div>
        </div>

        <div class="actions">
          <button class="done-btn" ${alreadyChecked ? "disabled" : ""}>Done</button>
          <button class="not-btn" ${alreadyChecked ? "disabled" : ""}>Not Done</button>
          <button class="remove-btn">Remove</button>
        </div>
      `;

      row.querySelector(".done-btn").addEventListener("click", () => checkIn(member.id, true));
      row.querySelector(".not-btn").addEventListener("click", () => checkIn(member.id, false));
      row.querySelector(".remove-btn").addEventListener("click", () => removeMember(member.id, member.name));

      memberList.appendChild(row);
    });

    const sorted = [...members].sort((a,b) =>
      Number(b.streak || 0) - Number(a.streak || 0)
      || Number(b.total || 0) - Number(a.total || 0)
    );

    sorted.forEach((member,index) => {
      const card = document.createElement("div");
      card.className = "leader-card";

      card.innerHTML = `
        <div class="rank">#${index + 1}</div>
        <h3>${escapeHTML(member.name)}</h3>
        <p>🔥 ${Number(member.streak || 0)} day streak</p>
        <p>📖 ${Number(member.total || 0)} pages read</p>
        <p class="${member.checkedToday ? "active" : "inactive"}">
          ${member.checkedToday ? "Active today" : "Needs check-in"}
        </p>
      `;

      leaderboard.appendChild(card);
    });
  }

  function escapeHTML(text){
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }
</script>

</body>
</html>
